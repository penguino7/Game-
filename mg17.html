<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini-game 17 — Maze Chase</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/mg17.css" />
  </head>
  <body>
    <div class="page">
      <div class="frame glass-frame">
        <header class="mg-header">
          <div class="header-info">
            <div class="q-badge">MINI-GAME 17</div>
            <h1>Cyber Runner</h1>
            <p>
              Thu thập đủ 4 Lõi Dữ Liệu (🎯) ở 4 góc mê cung để hoàn thành chiến
              dịch!
            </p>
          </div>
          <div class="header-right" style="display: flex; gap: 15px">
            <div
              class="lives-pill"
              id="nodesDisplay"
              style="
                border-color: #f59e0b;
                color: #fcd34d;
                background: rgba(245, 158, 11, 0.15);
              "
            >
              🎯 Dữ liệu: 0/4
            </div>
            <div class="lives-pill" id="livesDisplay">❤️ Mạng: 3</div>
            <a class="btn-ghost" href="questions.html">← Abort</a>
          </div>
        </header>

        <main class="mg-container">
          <div id="startOverlay" class="start-overlay">
            <button
              id="startBtn"
              class="btn-primary"
              style="
                font-size: 24px;
                padding: 18px 40px;
                box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
              "
            >
              ▶ XÂM NHẬP HỆ THỐNG
            </button>
          </div>

          <div class="maze-wrapper" style="position: relative">
            <div id="mazeGrid" class="maze-grid"></div>
          </div>

          <div
            id="questionModal"
            class="start-overlay hidden"
            style="z-index: 200"
          >
            <div class="question-card">
              <h2 style="color: #4ade80; margin-top: 0">
                🔓 ĐÃ TRUY CẬP LÕI DỮ LIỆU!
              </h2>
              <p
                id="modalQuestionText"
                style="font-size: 22px; line-height: 1.5; margin: 20px 0"
              >
                Đang tải câu hỏi...
              </p>

              <div class="ans-grid" id="ansGrid"></div>
            </div>
          </div>
        </main>

        <footer class="mg-footer">
          <div id="statusMessage" class="feedback-box hidden"></div>
          <button id="finishBtn" class="btn-primary" style="display: none">
            Return to Board
          </button>
        </footer>
      </div>
    </div>

    <script src="js/mg17.js"></script>
  </body>
</html>
