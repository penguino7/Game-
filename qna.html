<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Challenge — Security Challenge</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/qna.css" />
  </head>
  <body>
    <div class="page">
      <div class="frame glass-frame">
        <div class="qna-split-layout">
          <div class="qna-col-left" id="qOptions"></div>

          <div class="qna-col-center">
            <div class="floating-element">
              <div class="hacker-icon">💻</div>
              <div class="shadow"></div>
            </div>
          </div>

          <div class="qna-col-right">
            <div class="q-badge" id="qLabel">CHALLENGE 00</div>
            <h2 id="qTopic" class="q-topic-title">Loading Topic...</h2>

            <div class="q-text" id="qText">Loading question...</div>

            <div
              id="qSnippetBox"
              class="terminal q-snippet"
              style="display: none"
            >
              <div class="term" id="qSnippet"></div>
            </div>

            <div class="action-box">
              <div id="feedbackBox" class="feedback-box hidden"></div>
              <div class="btn-group">
                <button id="submitBtn" class="btn-primary" disabled>
                  Submit
                </button>
                <a class="btn-ghost" href="questions.html">← Abort</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="js/qna.data.js"></script>
    <script src="js/qna.js"></script>
  </body>
</html>
