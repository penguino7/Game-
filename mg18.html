<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini-game 18 — Malware Whacker</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/mg18.css" />
  </head>
  <body>
    <div class="page">
      <div class="frame glass-frame">
        <header class="mg-header">
          <div class="header-info">
            <div class="q-badge">MINI-GAME 18</div>
            <h1>Data Whacker</h1>
            <p>Đọc kỹ nhiệm vụ, nhìn nhanh từ khóa và đập thật chính xác!</p>
          </div>
          <div
            class="header-right"
            style="display: flex; gap: 15px; align-items: center"
          >
            <div class="score-pill" id="scoreDisplay">Điểm: 0</div>
            <div class="timer-pill" id="timerDisplay">00:45</div>
            <a class="btn-ghost" href="questions.html">← Abort</a>
          </div>
        </header>

        <main class="mg-container">
          <div id="startOverlay" class="start-overlay">
            <button
              id="startBtn"
              class="btn-primary"
              style="
                font-size: 24px;
                padding: 18px 40px;
                box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
              "
            >
              ▶ NHẬN NHIỆM VỤ
            </button>
          </div>

          <div class="question-box hidden" id="questionBox">
            <h2 id="questionText">Đang tải nhiệm vụ...</h2>
          </div>

          <div class="whack-board" id="whackBoard"></div>
        </main>

        <footer class="mg-footer">
          <div id="statusMessage" class="feedback-box hidden"></div>
          <button id="finishBtn" class="btn-primary" style="display: none">
            Return to Board
          </button>
        </footer>
      </div>
    </div>

    <script src="js/mg18.js"></script>
  </body>
</html>
