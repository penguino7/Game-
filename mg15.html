<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini-game 15 — Group Sort</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/mg15.css" />
  </head>
  <body>
    <div class="page">
      <div class="frame glass-frame">
        <header class="mg-header">
          <div class="header-info">
            <div class="q-badge">MINI-GAME 15</div>
            <h1>Cyber Classifier</h1>
            <p>
              Kéo thả các từ khóa bên trái vào đúng nhóm phân loại bên phải.
            </p>
          </div>
          <a class="btn-ghost" href="questions.html">← Abort</a>
        </header>

        <main class="mg-container">
          <div id="startOverlay" class="start-overlay">
            <button
              id="startBtn"
              class="btn-primary"
              style="font-size: 22px; padding: 16px 36px"
            >
              ▶ BẮT ĐẦU PHÂN LOẠI
            </button>
          </div>

          <div class="game-layout">
            <div class="left-col">
              <h2 class="col-title">Unsorted (Chưa phân loại)</h2>
              <div class="unsorted-list" id="unsortedList"></div>
            </div>

            <div class="right-col">
              <div class="drop-group" data-group="ATTACK">
                <h3 class="group-title">☣️ ATTACKS (Tấn công)</h3>
                <div class="drop-zone" id="zoneAttack"></div>
              </div>

              <div class="drop-group" data-group="DEFENSE">
                <h3 class="group-title">🛡️ DEFENSES (Phòng thủ)</h3>
                <div class="drop-zone" id="zoneDefense"></div>
              </div>
            </div>
          </div>
        </main>

        <footer class="mg-footer">
          <div id="statusMessage" class="feedback-box hidden"></div>
          <button id="finishBtn" class="btn-primary" style="display: none">
            Return to Board
          </button>
        </footer>
      </div>
    </div>

    <script src="js/mg15.js"></script>
  </body>
</html>
