<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini-game 13 — Security Challenge</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/mg13.css" />
  </head>
  <body>
    <div class="page">
      <div class="frame glass-frame">
        <header class="mg-header">
          <div class="header-info">
            <div class="q-badge">MINI-GAME 13</div>
            <h1>Firewall Defender</h1>
            <p>
              Click tiêu diệt mã độc (XSS, SQLi...). ĐỪNG bắn nhầm gói tin an
              toàn (HTTPS, WAF)!
            </p>
          </div>

          <div
            class="header-right"
            style="display: flex; align-items: center; gap: 20px"
          >
            <div class="score-pill" id="scoreDisplay">Score: 0 / 10</div>
            <div class="timer-pill" id="timerDisplay">00:30</div>
            <a class="btn-ghost" href="questions.html">← Abort</a>
          </div>
        </header>

        <main class="mg-container">
          <div id="startOverlay" class="start-overlay">
            <button
              id="startBtn"
              class="btn-primary"
              style="font-size: 24px; padding: 20px 40px"
            >
              ▶ KÍCH HOẠT TƯỜNG LỬA
            </button>
          </div>

          <div class="game-area" id="gameArea"></div>
        </main>

        <footer class="mg-footer">
          <div id="statusMessage" class="feedback-box hidden"></div>
          <button id="finishBtn" class="btn-primary" style="display: none">
            Return to Board
          </button>
        </footer>
      </div>
    </div>

    <script src="js/mg13.js"></script>
  </body>
</html>
